<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .content {
    display: flex;
    align-items: center;
    gap: 48px;
    z-index: 1;
  }
  .icon-wrapper {
    width: 160px;
    height: 160px;
    border-radius: 32px;
    overflow: hidden;
    background: #FEFEFE;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(255,255,255,0.1);
  }
  .icon-wrapper img {
    width: 100%;
    height: 100%;
  }
  .text {
    color: #FEFEFE;
  }
  .text h1 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }
  .text p {
    font-size: 22px;
    font-weight: 400;
    color: rgba(254,254,254,0.7);
  }
  .bg-accent {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: rgba(254,254,254,0.03);
    border-radius: 50%;
  }
  .bg-accent-2 {
    position: absolute;
    bottom: -150px;
    left: -50px;
    width: 300px;
    height: 300px;
    background: rgba(254,254,254,0.02);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="bg-accent"></div>
  <div class="bg-accent-2"></div>
  <div class="content">
    <div class="icon-wrapper">
      <img src="google-play/icon/icon-512x512.png" />
    </div>
    <div class="text">
      <h1>Heimatplatz</h1>
      <p>Immobilien in Oberösterreich</p>
    </div>
  </div>
</body>
</html>
